# H-PTB (Phase Transition Benchmark) — Learning Track
benchmark: H-PTB
track: Learning

dataset: PCFG-SET
sample_size: 200

conditions:
  A:
    name: Random/IID
    description: Baseline random sample ordering
  B:
    name: Difficulty-Ordered
    description: Easy-to-hard difficulty schedule
  C:
    name: Structure-Targeted
    description: Contrastive pairs targeting structural rules
  D:
    name: Structure-Targeted + Alpha-Building
    description: Contrastive pairs with explicit rule/surface discrimination

metrics:
